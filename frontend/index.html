<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>

  <!-- Fonts: VT323 (display/pixel) + Space Mono (body/terminal) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Background image layer -->
  <div id="bg"></div>

  <!-- App shell -->
  <div class="app-shell">
    <nav class="nav">
      <a href="#/dashboard" class="nav-brand">v0..0</a>
      <div class="nav-links">
        <a href="#/dashboard" class="nav-link active" data-route="/dashboard">Dashboard</a>
        <a href="#/transactions" class="nav-link" data-route="/transactions">Transactions</a>
        <a href="#/categories" class="nav-link" data-route="/categories">Categories</a>
      </div>
      <button class="btn-wallpaper" id="shuffle-bg" aria-label="Change wallpaper"></button>
    </nav>

    <main id="page"></main>
  </div>

  <!-- Toast notifications -->
  <div id="toast"></div>

  <!-- Modal portal -->
  <div id="modal-root"></div>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- App scripts (order matters) -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/transactions.js"></script>
  <script src="js/pages/categories.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
